# Controlled vocabulary for BenchSpec.sparse_layouts.<arr>.variants.<format>
#
# Each entry lists the format's required buffer roles + a one-line summary
# of when to use it. The Python authoritative copy lives at
# `optarena/spec.py:REQUIRED_BUFFER_ROLES`; this YAML mirrors it for
# documentation and external tooling (e.g. an IDE schema completion).
#
# Adding a new format = 3 places: this file, `spec.py:SUPPORTED_SPARSE_FORMATS`,
# and a matching dispatcher in `optarena/NumpyToC/src/numpyto_c/sparse_emit.py`.
formats:
  dense:
    buffers: [data]
    summary: Standard contiguous tensor; no compression.
    use: Default for non-sparse arrays.

  csr:
    buffers: [indptr, indices, data]
    summary: Compressed Sparse Row — row pointers + column indices + values.
    use: Most common compute format; fast row iteration / SpMV.
    reference: https://docs.scipy.org/doc/scipy/reference/generated/scipy.sparse.csr_matrix.html

  csc:
    buffers: [indptr, indices, data]
    summary: Compressed Sparse Column — transposed CSR.
    use: Column iteration / matvec on A^T; A.T of a CSR view.
    reference: https://docs.scipy.org/doc/scipy/reference/generated/scipy.sparse.csc_matrix.html

  coo:
    buffers: [row, col, data]
    summary: Coordinate List — (row, col, value) triples.
    use: Construction / format conversion; one-pass scan + scatter-add SpMV.
    reference: https://docs.scipy.org/doc/scipy/reference/generated/scipy.sparse.coo_matrix.html

  dia:
    buffers: [data, offsets]
    summary: Diagonal — band of diagonals stored as 2-D data + offset list.
    use: Banded matrices (jacobi/seidel-style stencils).
    reference: https://docs.scipy.org/doc/scipy/reference/generated/scipy.sparse.dia_matrix.html

  bcsr:
    buffers: [indptr, indices, data]
    summary: Block CSR — fixed-block-size CSR extension (formerly bsr).
    use: Block-structured stencils and FEM matrices.
    reference: https://docs.scipy.org/doc/scipy/reference/generated/scipy.sparse.bsr_matrix.html

  bcoo:
    buffers: [row, col, data]
    summary: Block COO — coordinate list of R x C dense value blocks;
      row/col hold block coordinates, data is 3-D [n_blocks, R, C].
    use: Block-structured construction / scatter-add SpMV; the block
      analogue of coo over bcsr's block layout.
    reference: https://docs.scipy.org/doc/scipy/reference/generated/scipy.sparse.bsr_matrix.html

  ell:
    buffers: [indices, data]
    summary: ELLPACK — fixed max-degree padding; 2-D indices and data.
    use: Regular-degree graphs; GPU-friendly SpMV.
    reference: https://itshelenxu.github.io/files/papers/pcsr.pdf

  packed_banded:
    buffers: [data, lbound, ubound]
    summary: Banded matrix as packed [N x (lbound + ubound + 1)] strip.
    use: banded_mmt kernel's native storage; LAPACK-compatible.

  # ---- v2 additions per session decision (JDS + SELL-C-σ only) ----

  jds:
    buffers: [perm, jd_ptr, col_ind, jdiag]
    summary: Jagged Diagonal Storage — rows sorted by length, then
      column-major store of "jagged diagonals" (i-th nz of each row).
      Saad's SPARSKIT classic; vector-machine and GPU friendly.
    use: GPU SpMV baseline; classic on NEC/Cray vector pipelines.
    reference: https://netlib.org/linalg/html_templates/node95.html

  sell_c_sigma:
    buffers: [slice_ptr, col_idx, val, row_len, perm]
    summary: Sliced ELLPACK — ELL cut into C-row slices, each slice
      padded to its own max row-length; rows pre-sorted by length
      within a sigma-window to cut padding. Unified format across
      CPU, MIC, and GPU.
    use: SIMD/SIMT-portable SpMV; far less padding than plain ELL.
    reference: https://arxiv.org/abs/1307.6209
    parameters:
      C: slice height (typically 32 on GPU, 4-8 on CPU)
      sigma: sort window (typically multiples of C)
